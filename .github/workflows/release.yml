name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply v0.3.1 repository updates
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path, old, new, *, count=1):
              file_path = Path(path)
              text = file_path.read_text(encoding="utf-8")
              if new in text:
                  return
              if old not in text:
                  raise RuntimeError(f"Expected text not found in {path}")
              file_path.write_text(text.replace(old, new, count), encoding="utf-8")

          def replace_between(path, start_marker, end_marker, new):
              file_path = Path(path)
              text = file_path.read_text(encoding="utf-8")
              if new in text:
                  return
              start = text.index(start_marker)
              end = text.index(end_marker, start)
              file_path.write_text(
                  text[:start] + new + text[end:],
                  encoding="utf-8",
              )

          config_flow = "custom_components/notification_dispatcher/config_flow.py"
          replace(config_flow, "import re\n", "import logging\nimport re\n")
          replace(
              config_flow,
              'TARGET_ALL_ALIASES = {"all", "alle"}\n\n\nclass InvalidTimeWindow',
              'TARGET_ALL_ALIASES = {"all", "alle"}\n_LOGGER = logging.getLogger(__name__)\n\n\nclass InvalidTimeWindow',
          )
          replace(
              config_flow,
              '            except InvalidTimeWindow as err:\n'
              '                errors[err.field] = "invalid_time_window"\n'
              '            else:\n',
              '            except InvalidTimeWindow as err:\n'
              '                errors[err.field] = "invalid_time_window"\n'
              '            except Exception:\n'
              '                _LOGGER.exception("Unable to save notification dispatcher person")\n'
              '                errors["base"] = "save_failed"\n'
              '            else:\n',
          )
          replace(
              config_flow,
              '            except InvalidTimeWindow as err:\n'
              '                errors[err.field] = "invalid_time_window"\n'
              '            else:\n',
              '            except InvalidTimeWindow as err:\n'
              '                errors[err.field] = "invalid_time_window"\n'
              '            except Exception:\n'
              '                _LOGGER.exception("Unable to update notification dispatcher person")\n'
              '                errors["base"] = "save_failed"\n'
              '            else:\n',
          )
          replace(
              config_flow,
              '    profile = profile or {}\n\n'
              '    return vol.Schema(\n',
              '    profile = profile or {}\n'
              '    notify_target_options = _notify_target_select_options(hass)\n'
              '    if notify_target_options:\n'
              '        notify_target_selector = SelectSelector(\n'
              '            SelectSelectorConfig(\n'
              '                options=notify_target_options,\n'
              '                multiple=True,\n'
              '                custom_value=True,\n'
              '            )\n'
              '        )\n'
              '        notify_target_default = _targets_to_list(profile.get(CONF_NOTIFY_TARGETS, []))\n'
              '    else:\n'
              '        notify_target_selector = TextSelector()\n'
              '        notify_target_default = _targets_to_text(profile.get(CONF_NOTIFY_TARGETS, []))\n\n'
              '    return vol.Schema(\n',
          )
          replace(
              config_flow,
              '            vol.Required(\n'
              '                CONF_NOTIFY_TARGETS,\n'
              '                default=_targets_to_text(profile.get(CONF_NOTIFY_TARGETS, [])),\n'
              '            ): TextSelector(),\n',
              '            vol.Required(\n'
              '                CONF_NOTIFY_TARGETS,\n'
              '                default=notify_target_default,\n'
              '            ): notify_target_selector,\n',
          )
          replace(
              config_flow,
              '    enabled_types = set(user_input.get(CONF_ENABLED_TYPES, []))\n',
              '    enabled_types = set(_ensure_list(user_input.get(CONF_ENABLED_TYPES)))\n',
          )
          replace_between(
              config_flow,
              "def _known_notify_targets",
              "\n\ndef _targets_from_input",
              '''def _known_notify_targets(hass: HomeAssistant) -> set[str]:
    """Return notify services and notify entities that can be offered in the UI."""
    targets: set[str] = set()

    for service in _notify_services(hass):
        if service in {"persistent_notification", "send_message"}:
            continue
        targets.add(f"notify.{service}")

    try:
        targets.update(hass.states.async_entity_ids("notify"))
    except Exception:
        _LOGGER.exception("Unable to list notify entities for options flow")

    return targets


def _notify_services(hass: HomeAssistant) -> list[str]:
    """Return notify service names without failing the options flow."""
    try:
        return list(hass.services.async_services_for_domain("notify"))
    except AttributeError:
        try:
            return list(hass.services.async_services().get("notify", {}))
        except Exception:
            _LOGGER.exception("Unable to list notify services for options flow")
            return []
    except Exception:
        _LOGGER.exception("Unable to list notify services for options flow")
        return []


def _notify_target_select_options(hass: HomeAssistant) -> list[dict[str, str]]:
    """Build select options for available notify targets."""
    targets = sorted(
        _known_notify_targets(hass),
        key=lambda target: _notify_target_label(hass, target).casefold(),
    )
    return [
        {
            "value": target,
            "label": _notify_target_label(hass, target),
        }
        for target in targets
    ]


def _notify_target_label(hass: HomeAssistant, target: str) -> str:
    """Return a readable label for a notify target."""
    state = hass.states.get(target)
    if state is not None:
        friendly_name = state.attributes.get("friendly_name")
        if friendly_name:
            return f"{friendly_name} ({target})"

    name = target.removeprefix("notify.")
    if name.startswith("mobile_app_"):
        name = name.removeprefix("mobile_app_")
    label = name.replace("_", " ").title()
    return f"{label} ({target})"''',
          )
          replace(
              config_flow,
              'def _optional_enabled_types(value: Any) -> list[str]:\n',
              'def _targets_to_list(value: Any) -> list[str]:\n'
              '    """Render notify targets for a multi-select field."""\n'
              '    if isinstance(value, str):\n'
              '        return [target.strip() for target in value.split(",") if target.strip()]\n'
              '    if isinstance(value, list):\n'
              '        return [str(item).strip() for item in value if str(item).strip()]\n'
              '    return []\n\n\n'
              'def _optional_enabled_types(value: Any) -> list[str]:\n',
          )

          replace(
              "custom_components/notification_dispatcher/dispatcher.py",
              "        enabled_types = set(profile.get(CONF_ENABLED_TYPES, []))\n",
              "        enabled_types = set(_ensure_list(profile.get(CONF_ENABLED_TYPES)))\n",
          )
          replace(
              "custom_components/notification_dispatcher/manifest.json",
              '"version": "0.3.0"',
              '"version": "0.3.1"',
          )
          for path in [
              "custom_components/notification_dispatcher/translations/de.json",
              "custom_components/notification_dispatcher/translations/en.json",
          ]:
              text = Path(path).read_text(encoding="utf-8")
              text = text.replace(
                  "Waehle eine Home-Assistant-Person und trage die Mobile-App-Ziele ein, zum Beispiel notify.mobile_app_jmi_iphone. Mehrere Ziele mit Komma trennen. Das Ziel alle/all ist fest eingebaut und nicht loeschbar.",
                  "Waehle eine Home-Assistant-Person und danach ein oder mehrere vorhandene Notify-Ziele aus. Falls ein Ziel nicht in der Liste steht, kannst du es weiterhin manuell eintragen. Das Ziel alle/all ist fest eingebaut und nicht loeschbar.",
              )
              text = text.replace(
                  "Choose a Home Assistant person and enter the mobile app targets, for example notify.mobile_app_jmi_iphone. Separate multiple targets with commas. The all/alle target is built in and cannot be deleted.",
                  "Choose a Home Assistant person and then select one or more existing notify targets. If a target is not listed, you can still enter it manually. The all/alle target is built in and cannot be deleted.",
              )
              text = text.replace(
                  '"reserved_group_name": "alle/all ist fest eingebaut und kann nicht als Gruppe verwendet werden."',
                  '"reserved_group_name": "alle/all ist fest eingebaut und kann nicht als Gruppe verwendet werden.",\n'
                  '      "save_failed": "Die Person konnte nicht gespeichert werden. Details stehen im Home-Assistant-Log."',
              )
              text = text.replace(
                  '"reserved_group_name": "all/alle is built in and cannot be used as a group name."',
                  '"reserved_group_name": "all/alle is built in and cannot be used as a group name.",\n'
                  '      "save_failed": "The person could not be saved. Details are available in the Home Assistant log."',
              )
              Path(path).write_text(text, encoding="utf-8")
          replace(
              "README.md",
              "pro Person eine `person.*` Entitaet und eine oder mehrere `notify.*` Mobile-App-Ziele hinterlegen",
              "pro Person eine `person.*` Entitaet und eine oder mehrere vorhandene `notify.*` Ziele auswaehlen",
          )
          replace(
              "README.md",
              "Beim Hinzufuegen einer Person waehlst du direkt die vorhandene `person.*` Entitaet aus Home Assistant aus. Danach hinterlegst du ein oder mehrere Mobile-App-Ziele als Text, zum Beispiel `notify.mobile_app_jmi_iphone`. Mehrere Ziele trennst du mit Komma.",
              "Beim Hinzufuegen einer Person waehlst du direkt die vorhandene `person.*` Entitaet aus Home Assistant aus. Danach waehlst du ein oder mehrere vorhandene Notify-Ziele aus, zum Beispiel `notify.mobile_app_jmi_iphone`. Falls Home Assistant kein Ziel melden kann oder ein Ziel fehlt, bleibt eine manuelle Eingabe moeglich.",
          )
          replace(
              "info.md",
              "assign one or more mobile app notify targets to each person",
              "select one or more existing notify targets for each person",
          )
          PY

      - name: Commit v0.3.1 repository updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom_components README.md info.md
          if ! git diff --cached --quiet; then
            git commit -m "Fix person options flow and notify target selector"
            git push
          fi

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.3.1
          name: v0.3.1
          target_commitish: main
          make_latest: true
          body: |
            Notification Dispatcher v0.3.1

            - Fixes adding people when no additional notification types are selected.
            - Shows available notify targets as a multi-select dropdown.
            - Keeps manual notify target entry as a fallback.
            - Makes notify target discovery resilient so the options flow does not fail.
