name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.3.0
          name: v0.3.0
          target_commitish: main
          make_latest: true
          body: |
            Notification Dispatcher v0.3.0

            - Fixes the person form when no mobile app target selector options are available.
            - Shows mobile app targets as a reliable text field with comma-separated values.
            - Adds built-in all/alle target aliases.
            - Adds configurable notification groups.
