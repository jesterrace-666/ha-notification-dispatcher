name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Read version from manifest
        id: version
        shell: bash
        run: |
          VERSION=$(python - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(
              Path("custom_components/notification_dispatcher/manifest.json").read_text(encoding="utf-8")
          )
          print(manifest["version"])
          PY
          )
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check existing release tag
        id: tag_check
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/v$VERSION" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v$VERSION already exists - skipping release creation."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release name
        id: release_name
        if: steps.tag_check.outputs.exists == 'false'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          if [[ "$VERSION" == 1.* ]]; then
            echo "value=v$VERSION Herald" >> "$GITHUB_OUTPUT"
          else
            echo "value=v$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: ${{ steps.release_name.outputs.value }}
          target_commitish: main
          make_latest: true
          generate_release_notes: true
