send:
  name: Send notification
  description: Dispatch a notification to configured people according to their rules.
  fields:
    title:
      name: Title
      description: Notification title.
      required: false
      selector:
        text:
    message:
      name: Message
      description: Notification message.
      required: true
      selector:
        text:
          multiline: true
    type:
      name: Type
      description: Delivery type. Critical bypasses schedule, DND, and home checks.
      required: false
      default: info
      selector:
        select:
          options:
            - critical
            - warning
            - info
            - reminder
    target:
      name: Recipients
      description: Select one or more Home Assistant people. Leave empty to notify all configured people.
      required: false
      selector:
        entity:
          multiple: true
          filter:
            - domain: person
    data:
      name: Data
      description: Optional raw data passed through to the notify action.
      required: false
      advanced: true
      selector:
        object:
