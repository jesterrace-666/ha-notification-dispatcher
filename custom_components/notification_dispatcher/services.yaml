send:
  name: Send notification
  description: Dispatch a notification to configured people according to their rules.
  fields:
    title:
      name: Title
      description: Notification title.
      required: false
      selector:
        text:
    message:
      name: Message
      description: Notification message.
      required: true
      selector:
        text:
          multiline: true
    type:
      name: Type
      description: Delivery type. Critical bypasses schedule, DND, and home checks.
      required: false
      default: info
      selector:
        select:
          options:
            - critical
            - warning
            - info
            - reminder
    target_all:
      name: Send to all recipients
      description: Send to all configured dispatcher people. For critical notifications this is always applied.
      required: false
      default: false
      selector:
        boolean:
    target:
      name: Recipients
      description: Select one or more Home Assistant people. Only people configured in the dispatcher will receive notifications.
      required: false
      selector:
        entity:
          multiple: true
          filter:
            - domain: person
