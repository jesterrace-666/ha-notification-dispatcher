send:
  target:
    entity:
      filter:
        integration: notification_dispatcher
        domain: sensor
  fields:
    title:
      required: false
      selector:
        text:
    message:
      required: true
      selector:
        text:
          multiline: true
    type:
      required: false
      default: info
      selector:
        select:
          translation_key: notification_type
          options:
            - critical
            - warning
            - info
            - reminder
